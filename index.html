<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Downloads</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: #fffaf2;
            --text: #1f1a14;
            --muted: #6a5847;
            --accent: #b04d1d;
            --accent-dark: #7d3310;
            --border: #d8c4ad;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top, rgba(176, 77, 29, 0.14), transparent 35%),
                linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            width: min(760px, calc(100% - 32px));
            margin: 48px auto;
            padding: 32px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 18px 50px rgba(45, 26, 10, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        .mods {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 16px;
        }

        .mods li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .mod-name {
            margin: 0;
            font-size: 1.1rem;
        }

        .mod-size {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .download-link {
            flex-shrink: 0;
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

        .download-link:hover,
        .download-link:focus-visible {
            background: var(--accent-dark);
        }

        @media (max-width: 640px) {
            .mods li {
                flex-direction: column;
                align-items: flex-start;
            }

            .download-link {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Download Mods</h1>
        <p>Select a mod below to download it directly from this website.</p>
        <ul class="mods">
            <li>
                <div>
                    <h2 class="mod-name">burner</h2>
                    <p class="mod-size">Size: 13.64 KB</p>
                </div>
                <a class="download-link" href="Mods/burner-1.0.0.jar" download>Download</a>
            </li>
            <li>
                <div>
                    <h2 class="mod-name">foods for days</h2>
                    <p class="mod-size">Size: 1.63 MB</p>
                </div>
                <a class="download-link" href="Mods/foodsfordays-1.1.0.jar" download>Download</a>
            </li>
            <li>
                <div>
                    <h2 class="mod-name">tutorial mod (my first mod)</h2>
                    <p class="mod-size">Size: 1.20 MB</p>
                </div>
                <a class="download-link" href="Mods/tutorialmod-1.3.jar" download>Download</a>
            </li>
        </ul>
    </main>
</body>
</html>
